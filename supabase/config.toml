# Supabase CLI config. `supabase start` reads this and spins up the local stack.
# Docs: https://supabase.com/docs/guides/local-development/cli/config

project_id = "awsomequiz"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

# Inbucket is the local email sandbox — every signup confirmation/password-reset
# email lands here so we can test verification flows without a real SMTP server.
[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://localhost:8501"
additional_redirect_urls = ["http://localhost:8501", "http://localhost:8501/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
# Email confirmation disabled locally for fast iteration; enable in prod via the
# Supabase dashboard (Auth → Providers → Email → Confirm email).
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# Google OAuth is configured per-environment via env vars in the dashboard
# (or via `SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID` env for local CLI).
# Disabled by default locally — flip to true and populate via .env when ready.
[auth.external.google]
enabled = false
client_id = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET)"
redirect_uri = ""

[storage]
enabled = false

[analytics]
enabled = false

[functions]
verify_jwt = true
