<!doctype html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
(function () {
  function post(type, data) {
    window.parent.postMessage(Object.assign({
      isStreamlitMessage: true,
      type: 'streamlit:' + type,
    }, data || {}), '*');
  }

  function readCookie(name) {
    var prefix = name + '=';
    var parts = (document.cookie || '').split(';');
    for (var i = 0; i < parts.length; i++) {
      var p = parts[i].trim();
      if (p.indexOf(prefix) === 0) {
        try { return decodeURIComponent(p.slice(prefix.length)); }
        catch (e) { return p.slice(prefix.length); }
      }
    }
    return null;
  }

  window.addEventListener('message', function (event) {
    if (!event.data || event.data.type !== 'streamlit:render') return;
    var args = event.data.args || {};
    var name = args.cookie_name || 'awsomequiz_rt';
    post('setComponentValue', { value: readCookie(name), dataType: 'json' });
  });

  post('componentReady', { apiVersion: 1 });
  post('setFrameHeight', { height: 0 });
})();
</script>
</body>
</html>
