[theme]
base = "light"
primaryColor = "#2563EB"               # blue-600  -- buttons, links, focus rings
backgroundColor = "#F9FAFB"            # gray-50   -- page background
secondaryBackgroundColor = "#FFFFFF"   # white     -- cards, sidebar, inputs
textColor = "#111827"                  # gray-900
font = "sans serif"

[server]
headless = true

[client]
# Temporarily show full Python tracebacks in-app so we can diagnose deploy
# failures without needing Streamlit Cloud's Manage app logs.
showErrorDetails = "full"
