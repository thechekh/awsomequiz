# Streamlit-native theme is the FIRST-PAINT fallback only. The real per-user
# theme (system / light / Neutral Slate / High Contrast) is injected as CSS
# custom properties by app/theme.py once the page script runs. Setting the
# defaults here to Neutral Slate avoids a jarring light flash on cold load
# for users whose stored preference is dark.

[theme]
# Light theme tokens are the safer first-paint default: a brief light
# flash for dark users is less jarring than the inverse, and the BaseWeb
# widget internals (radio circles, selectbox dropdown popover) inherit
# these tokens before our CSS variables can override -- so anchoring on
# light keeps form widgets readable in both modes.
base = "light"
primaryColor = "#2563EB"                # light-mode accent (blue-600)
backgroundColor = "#F9FAFB"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#111827"
font = "sans serif"

[server]
headless = true
